# Monorepo entry: when you run pytest from the repo root with no paths,
# pytest's rootdir is this directory (not backend/), so backend/pyproject.toml
# is not used and keyboard_recommender would not be importable without this file.
#
# Prefer: cd backend && pip install -e ".[dev]" then pytest from backend/ or
# pytest backend/tests from the repo root.
#
# pythonpath / testpaths are relative to the directory that contains this file.

[pytest]
minversion = 7.0
testpaths = backend/tests
pythonpath = backend/src
markers =
    postgres: requires PostgreSQL at DATABASE_URL (migration/schema smoke)
